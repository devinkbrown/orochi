# =============================================================================
# Orochi — reference configuration
# =============================================================================
# This file documents every configuration section and key the daemon accepts,
# with its type, default, and accepted range. It is exhaustive: copy it, delete
# what you don't need, and edit the rest. All keys are optional EXCEPT the two
# marked REQUIRED ([node].id and [listen].irc).
#
# Format: TOML v1.0 (parsed by src/proto/toml.zig).
#
# String indirection: any string value may use
#   "env:NAME"     -> value of environment variable NAME
#   "@file:/path"  -> contents of the file at /path
# so secrets need not live in this file.
#
# Schema source of truth: src/daemon/config_format.zig (parseToml) and
# src/daemon/config_boot.zig (mapping to the live server).
# =============================================================================


# --- [node] — sovereign mesh identity ----------------------------------------
[node]
# REQUIRED. The 64-bit sovereign node id; keys the mesh registry and the CRDT
# replica lane. Must be >= 1. Choose a stable, network-unique value.
id = 1

# Optional Ed25519 identity keypair (hex), enabling PQ-secured S2S links. When
# secret_key is set the daemon derives its node identity and runs the Tsumugi
# (X-Wing + Ed25519) handshake for secured peers. Omit for plaintext-only mesh.
# public_key = "env:OROCHI_NODE_PUBKEY"
# secret_key = "env:OROCHI_NODE_SECKEY"


# --- [network] — network presentation ----------------------------------------
[network]
# Network name advertised in ISUPPORT NETWORK= and the registration welcome
# burst. Default: "Orochi".
name = "Orochi"
# This server's OWN name — the source prefix of server-originated lines (welcome
# numerics, the !weather/!news bot replies, etc.) and the identity presented to
# S2S peers. MUST be unique per node in a mesh so replies/identities don't
# collide. Default: "orochi.local".
# server_name = "irc.alpha.example.net"
# Optional per-node description shown in VERSION/WHOIS and mesh peer metadata.
# description = "Alpha node"
# Optional IRCv3 network icon: a URL to a network logo. When set, the daemon
# advertises a NETWORKICON=<url> ISUPPORT (005) token so clients can show the
# logo; omitted entirely when unset.
# icon_url = "https://eshmaki.me/icon.png"


# --- [motd] — message of the day (personalized template) ---------------------
[motd]
# MOTD text served by the MOTD command. It is a PER-CONNECTION TEMPLATE: each
# client sees it expanded with their own details. Split on newlines into lines;
# supports @file: to load from disk. When unset, a personalized default is used.
#
# Substitutions ({key} -> value; unknown keys left verbatim; {{ }} = literal):
#   {nick} {account} {host} {network} {server} {version} {time} {date}
#   {users} {opers} {channels}        live network figures
#   {greeting}                        "Good morning/afternoon/evening" by hour
#   {weather} {news}                  localized weather / headlines (see [weather]/[news])
# Conditionals ({if:COND}...{else}...{/if}; COND = oper | account | secure | weather | news):
#   {if:account}Welcome back, {account}!{else}Please register.{/if}
#   {if:oper}You have operator privileges.{/if}
#   {if:secure}{else}This link is not encrypted.{/if}
#
# A ready-to-use annotated example ships in etc/motd.example.txt:
# text = "@file:etc/motd.example.txt"
# Or inline:
# text = """
# {greeting}, {nick}! Welcome to {network} ({users} online).
# {if:account}Signed in as {account}.{else}Register to reserve your nick.{/if}
# """


# --- [admin] — ADMIN command contact details ---------------------------------
[admin]
# Shown in the ADMIN reply (RPL_ADMINLOC1 / RPL_ADMINEMAIL).
location = "Orochi IRC network"
email = "admin@orochi.local"


# --- [weather] — localized weather for the MOTD {weather} placeholder --------
[weather]
# When enabled, the daemon reads `source` (refreshed by an external updater) and
# renders it in the units the region uses (°F/mph for the US, °C/km/h elsewhere,
# °C/mph for the UK) into the MOTD {weather} variable.
enabled = false
# Path to a key=value source file. The updater writes lines like:
#   location=Austin
#   country=US
#   temp_c=22.0
#   wind_kph=20
#   desc=Partly cloudy
# A ready sample ships in etc/weather.example.kv. Example updater (cron):
#   curl -s 'wttr.in/Austin?format=j1' | jq -r ... > /var/lib/orochi/weather.kv
# source = "etc/weather.example.kv"
# Override the display location (else the file's `location`).
# location = "Austin, TX"
# ISO country code for unit selection (else the file's `country`).
# country = "US"
# Unit override: "auto" (default, by country) | "metric" | "imperial" | "uk".
# units = "auto"

# --- [news] — headlines for the MOTD {news} placeholder ----------------------
[news]
enabled = false
# Path to a file with one headline per line; the first `count` are joined.
# A ready sample ships in etc/news.example.txt.
# Example updater: curl an RSS/JSON feed, write headlines, one per line.
# source = "etc/news.example.txt"
count = 3


# --- [geo] — live !weather / !news fantasy bot -------------------------------
[geo]
# When enabled, the daemon answers in-channel `!weather [place]` and (in +W
# channels) `!news`/`!localnews` by fetching live data in a BACKGROUND thread
# (never blocking the reactor) and caching it. All sources are key-free:
#   weather -> wttr.in (plain HTTP); news -> bundled RSS feeds (src/proto/
#   news_sources.zig, ported from ophion). First request for a new location
#   replies "fetching… try again"; subsequent ones serve from cache.
# `!weather` uses each user's `location` metadata (set on connect from GeoIP, or
# `default_location` below), localized to their country (°F/mph for US/LR/MM,
# else °C/km-h). Users can override per call: `!weather Tokyo`.
enabled = false
# Skip TLS verification for the public read-only news feeds so the best-effort
# clean-room TLS reaches more hosts. Weather is plain HTTP and unaffected.
news_insecure_tls = true
# Minimum interval between bot replies in a single channel, in ms (anti-flood,
# so a user can't spam !weather to flood the channel). 0 disables. Range 0..600000.
cmd_cooldown_ms = 3000
# Fallback !weather location when a client has no GeoIP / `location` metadata.
# default_location = "Austin, TX"
# Directory of headline files written by tools/news_update.sh (curl + system CA,
# so it covers EVERY feed, including those the in-daemon clean-room TLS can't
# reach). When set, !news reads these files instead of fetching live — robust,
# key-free, never blocks. Run the updater from cron, e.g.:
#   */5 * * * * /path/to/orochi/tools/news_update.sh /var/lib/orochi/news 10
# news_cache_dir = "/var/lib/orochi/news"


# --- [listen] — listener sockets ---------------------------------------------
[listen]
# Bind address for all TCP listeners. Default: "127.0.0.1".
host = "0.0.0.0"
# REQUIRED. Plaintext IRC port. Must be non-zero.
irc = 6667
# Secure-WebSocket (wss) port for browser clients (0 = disabled). The listener
# reuses the [tls] certificate: clients connect with wss:// (e.g.
# wss://eshmaki.me:8080), the daemon completes the TLS + HTTP/1.1 WebSocket
# upgrade, and the connection then behaves as a normal IRC client (one IRC
# message per text frame, RFC 6455). Requires [tls] enabled.
ws = 0
# TESTING ONLY: stand the ws listener up WITHOUT TLS (plain ws://) when no
# certificate is configured. Browsers require wss in production; default off.
ws_plain = false
# WebTransport (HTTP/3 over QUIC) port for browser clients (0 = disabled).
# Requires [tls] certificate/signing material; it bridges each WT session to the
# configured IRC listener and prepends PROXY metadata for the real QUIC peer.
webtransport = 0
# Accept HAProxy PROXY protocol v1/v2 headers from trusted reverse proxies before
# IRC/TLS/WebSocket framing. Empty trusted_proxies disables this even if enabled.
proxy_protocol = false
# trusted_proxies = ["127.0.0.1", "::1"]
# Server-to-server (mesh) listener port (0 = disabled / leaf node).
s2s = 0
# UDP port for the media (SFU) transport plane (0 = ephemeral).
media = 0
# UDP port for the native OPVOX/OPVIS media leg (0 = ephemeral).
native_media = 0
# IPv4 advertised to clients as the server media (ICE) candidate.
media_host = "127.0.0.1"


# --- [tls] — TLS listener (modern-only; no STARTTLS) -------------------------
[tls]
# Stand up a TLS listener. When enabled with no cert_path/key_path, the daemon
# bootstraps a self-signed Ed25519 leaf using dns_name as the CN/SAN.
enabled = false
# TLS port (conventional IRCS port is 6697).
port = 6697
# On-disk PEM/DER material; set both to load instead of bootstrapping.
# cert_path = "/etc/orochi/tls/cert.pem"
# key_path  = "/etc/orochi/tls/key.pem"
# CN/SAN for the self-signed bootstrap leaf.
dns_name = "irc.example.net"
# Request a client certificate (mTLS) so SASL EXTERNAL can match the presented
# fingerprint to an account.
request_client_cert = false
# Also accept hardened TLS 1.2 (ECDHE-AEAD over secp256r1) clients on this
# listener via version-dispatch. Off by default to keep the TLS 1.3-only posture;
# when on, the 1.2 leg presents a bootstrapped ECDSA-P256 leaf.
enable_tls12 = false
# Enable TLS 1.3 PSK session tickets/resumption. Off by default.
enable_resumption = false
# Maximum 0-RTT early data bytes advertised in tickets. 0 disables early data
# while still allowing resumption when enable_resumption is true.
early_data_max_size = 0


# --- [sts] — IRCv3 Strict Transport Security ---------------------------------
[sts]
# Advertise an sts= capability telling clients to persist a secure-transport
# upgrade. Leave off for plaintext deployments so clients are never forced.
enabled = false
# Persistence lifetime advertised to secure clients, in seconds (default 30d).
duration = 2592000
# Secure (TLS) port clients should reconnect to when upgrading.
port = 6697
# Advertise `preload` (opt in only deliberately).
preload = false


# --- [mesh] — server-to-server / Suimyaku mesh -------------------------------
[mesh]
# Mesh realm; peers must share a realm to link. Default: "local".
realm = "local"
# Shared passphrase for plaintext S2S admission (MeshPass). For secured links
# use [node].secret_key instead.
# mesh_pass = "env:OROCHI_MESH_PASS"
# Trusted peer identity roots (array of hex/base64 Ed25519 public keys), for
# secured links. When set, secured S2S expects peers to match these keys.
# trust_roots = ["env:PEER_A_PUBKEY", "env:PEER_B_PUBKEY"]
# Auto-connect peers: each "host:port" is dialed at boot and re-dialed while
# its S2S link is down, so the mesh stays linked without an oper CONNECT.
# Hostnames resolve via DNS (A record); IPv6 hosts are bracketed ("[::1]:6900").
# Requires [listen].s2s on the remote node. Empty/absent = no auto-connect.
# connect = ["ircx.us:6900"]
# Refuse plaintext S2S entirely: reject inbound plaintext peers and never dial
# plaintext outbound. Only the Tsumugi-secured path is allowed; if secured S2S
# is not configured (no [node].secret_key / key file), ALL S2S is dropped rather
# than falling back to clear. Default false keeps the plaintext fallback.
# require_secured = true


# --- [limits] — capacity, timeouts, and advertised protocol limits -----------
[limits]
backlog = 128          # listen() backlog (1..32767)
max_clients = 1024     # max concurrent clients (1..32767)
num_shards = 1         # worker reactor shards (1..max_shards)
# Connection timeouts (duration strings, e.g. "30s", "2m"):
handshake_timeout = "30s"   # registration must complete within this
ping_interval = "2m"        # idle interval before a PING is sent
ping_timeout = "1m"         # unanswered-PING grace before disconnect
sweep_interval = "2s"       # timeout-sweep timer granularity
# Advertised + enforced length/count limits (also appear in ISUPPORT 005):
topiclen = 390         # TOPICLEN  (1..8192)
awaylen = 256          # AWAYLEN   (1..256)
kicklen = 307          # KICKLEN   (1..400)
nicklen = 64           # NICKLEN   (1..64)
channellen = 64        # CHANNELLEN (2..200)
maxlist = 100          # per-channel cap on each list mode +b/+e/+I/+Z (1..10000)
chanlimit = 50         # max channels a non-oper may join (1..10000)
maxtargets = 4         # max targets per PRIVMSG/NOTICE (1..64)
monitorlimit = 128     # max MONITOR targets per client (1..100000)
silencelimit = 32      # max SILENCE masks per client (1..256)
# Anti-abuse:
max_clones_per_ip = 0          # 0 = unlimited (0..65535)
max_clones_per_net = 0         # 0 = unlimited (0..65535)
reputation_refuse_threshold = 0  # refuse connections above this penalty (0 = off)
reputation_half_life = "1m"    # decay half-life of the reputation penalty


# --- [io] — io_uring tuning --------------------------------------------------
[io]
ring_entries = 32      # io_uring SQ entries per reactor (8..4096)


# --- [reputation] — decaying IP-reputation penalty weights -------------------
[reputation]
registration_timeout_penalty = 50.0   # added when a client times out (0..1000)
clone_refuse_penalty = 25.0           # added when a clone is refused (0..1000)


# --- [sessions] — multi-session / bouncer registry sizing --------------------
[sessions]
max_accounts = 65536   # distinct accounts tracked (1..2^32)
max_per_account = 64   # live sessions per account (1..1000000)


# --- [sasl] — SASL authentication + account store ----------------------------
[sasl]
# Enable SASL (PLAIN/SCRAM-SHA-256/EXTERNAL). Explicit false disables SASL even
# when account_db is configured; if omitted, account_db-only legacy configs still
# enable SASL.
enabled = false
# Optional informational SASL/account realm. Current mechanisms do not emit it in
# wire challenges.
# realm = "example.net"
# WAL-backed account store path (relative to the daemon cwd). When set, the
# daemon opens it and verifies SASL credentials against it. With the store open,
# SESSION-TOKEN (opaque reconnect tokens, issued only over TLS) is also available;
# SCRAM-SHA-512-PLUS is offered automatically to TLS clients (tls-exporter channel
# binding, RFC 9266).
# account_db = "/var/lib/orochi/accounts.db"
# Allow SASL ANONYMOUS guest logins (RFC 4505). Default false — anonymous is a
# spam/abuse vector; a guest binds NO account and gets NO oper/services privileges.
allow_anonymous = false
# OAUTHBEARER (RFC 7628): verify a signed JWT bearer token against a locally
# configured key. Advertised ONLY when exactly one key source below is set. OAuth
# identities are federated and are NEVER auto-elevated to oper.
#   oauth_hmac_key  = "env:OROCHI_OAUTH_HS256_SECRET"  # HS256 shared secret
#   oauth_jwks_file = "/etc/orochi/oauth/jwks.json"    # RS256/ES256 JWKS
#   oauth_pubkey    = "/etc/orochi/oauth/pub.pem"      # RS256/ES256 PEM/DER public key
# oauth_issuer        = "https://idp.example.net/"     # require this `iss` when set
# oauth_audience      = "orochi"                        # require this `aud` when set
# oauth_account_claim = "sub"                           # JWT claim -> account (default "sub")


# --- [oper] — operator subsystem settings ------------------------------------
[oper]
# Path for persisting runtime GRANT/REVOKE operator grants. When set, the active
# grants (from the GRANT command) are written here on change and reloaded at
# boot, so runtime-granted opers survive a restart. Revoked accounts are dropped
# from the file. Leave unset to keep runtime grants in-memory only.
# grants_path = "/var/lib/orochi/oper_grants.tsv"


# --- [[opers]] — operator bindings (SASL-only) -------------------------------
# Operators are granted by ACCOUNT, never by password. Each block binds a SASL
# account to a privilege class; the account auto-elevates on login.
# [[opers]]
# account = "alice"
# class   = "netadmin"
# title   = "Network Guardian"   # optional; shown in WHOIS


# --- [[oper_groups]] — role-based privilege classes --------------------------
# A named privilege set, optionally inheriting another group's privileges.
# Referenced by an [[opers]] block's `class`.
# [[oper_groups]]
# name       = "netadmin"
# privileges = ["client_kill", "channel_moderate", "server_rehash", "server_restart", "mesh_admin"]
# inherits   = ""


# --- [cloak] — hostname cloaking ---------------------------------------------
[cloak]
# Secret passphrase for HMAC host cloaking. When set, every client's real IP is
# cloaked with a key derived from this secret (stable across restarts). When
# absent, a random per-boot key is used (privacy on by default, but cloaks
# change each restart).
# secret = "env:OROCHI_CLOAK_SECRET"
# Optional network-identifying suffix used in generated cloak hostnames.
# suffix = "ircxnet"


# --- [acme] — automatic TLS certificate renewal (Linux only) -----------------
# In-daemon ACME renewal. The daemon checks the [tls].cert_path leaf's expiry on a
# schedule and, when within renew_before_days, issues a new certificate (clean-room
# ACME, off the reactor) and hot-swaps it on reactor 0 — no restart. Requires [tls]
# with cert_path/key_path set. Changing those paths via live REHASH while [acme] is
# enabled is unsupported.
[acme]
enabled = false
# directory_url = "https://acme-v02.api.letsencrypt.org/directory"
# domain  = "irc.example.net"
# contact = "mailto:admin@example.net"
renew_before_days = 30        # renew when the leaf is within N days of expiry (1..89)
check_interval = "12h"        # how often to check the leaf expiry


# --- [media] — voice/video (SFU) ---------------------------------------------
[media]
enabled = false
max_upload_bytes = 16777216   # 16 MiB upload cap (0..1 GiB)
max_frame_bytes = 65536       # 64 KiB per media frame (0..16 MiB)
# Max participants per SFU room (group voice/video), enforced at join. Range 1..256
# (the inline roster ceiling); the native OPVOX/OPVIS call leg caps at 64. Default 64.
max_participants = 64
# Kagura media reorder/reassembly window in frames, clamped to 1..64. Default 64.
reorder_window_frames = 64
# Require an authenticated per-datagram MAC on native (OPVOX/OPVIS) media. Default
# false (accept untagged) for back-compat; when true, untagged or bad-tag datagrams
# are dropped before the SFU learns the sender. Requires matching client support
# (the server advertises mac=hmac-sha256-128 on the native media line).
native_media_require_mac = false
# STUN server (IPv4 literal) queried at boot for the reflexive media candidate;
# with stun_port set, overrides listen.media_host on success.
# stun_host = "stun.example.net"
# stun_port = 3478


# --- [stats] — web stats publication -----------------------------------------
[stats]
# Directory to publish stats.json + index.html into (e.g. an nginx root).
# Empty = disabled.
# dir = "/var/www/orochi"
interval = "30s"       # minimum interval between stats writes


# --- [metrics] — live Prometheus endpoint ------------------------------------
[metrics]
# TCP port for live HTTP GET /metrics. 0 = disabled. Binds loopback by default.
listen = 0
# Bind address for the metrics listener. Keep loopback unless a firewall/reverse
# proxy protects the endpoint.
bind = "127.0.0.1"


# --- [geoip] — GeoIP enrichment ----------------------------------------------
[geoip]
# Path to a MaxMind .mmdb database. Empty = GeoIP disabled.
# database = "/usr/share/GeoIP/GeoLite2-City.mmdb"
# Optional separate ASN .mmdb database for WHOIS AS-number/org enrichment.
# asn_database = "/usr/share/GeoIP/GeoLite2-ASN.mmdb"
