name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ZIG_VERSION: "0.17.0-dev.1282+c0f9b51d8"

jobs:
  check:
    name: type-check (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      # mlugg/setup-zig@v1 lags fresh tags and dev builds. Install straight from
      # ziglang.org: release pins live under /download, dev pins under /builds.
      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: |
          if [[ "${ZIG_VERSION}" == *"-dev."* ]]; then
            url="https://ziglang.org/builds/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          else
            url="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          fi
          curl -fsSL "$url" -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
      - run: zig version
      # `zig build check` semantically analyses the daemon without emitting a
      # binary — the fastest signal that the tree still compiles.
      - name: Semantic check
        run: zig build check

  build-test:
    name: build & test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      # mlugg/setup-zig@v1 lags fresh tags and dev builds. Install straight from
      # ziglang.org: release pins live under /download, dev pins under /builds.
      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: |
          if [[ "${ZIG_VERSION}" == *"-dev."* ]]; then
            url="https://ziglang.org/builds/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          else
            url="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          fi
          curl -fsSL "$url" -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
      - run: zig version
      - name: Build (debug)
        run: zig build
      # The browser codec WASM step wires standalone module paths by hand, so a
      # file rename can break it while every native step still builds (this
      # exact break shipped once) — keep it in CI.
      - name: Build browser WASM modules
        run: zig build wasm
      # Debug catches safety checks and leak reports; ReleaseSafe catches codegen
      # and optimization-only regressions without making CI depend on ReleaseFast
      # runtime assertions.
      - name: Run ReleaseSafe smoke suites
        run: zig build test-smoke -Doptimize=ReleaseSafe --summary all
      # Threaded server tests need loopback sockets + io_uring; when a runner
      # lacks either the tests SkipZigTest rather than fail, so this stays green
      # on any hosted runner while exercising everything available.
      - name: Run focused smoke suites
        run: zig build test-smoke-verbose --summary all
      - name: Run deterministic assurance suite
        run: zig build all-checks-verbose --summary all

  release:
    name: release build (x86_64-linux-musl)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      # mlugg/setup-zig@v1 lags fresh tags and dev builds. Install straight from
      # ziglang.org: release pins live under /download, dev pins under /builds.
      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: |
          if [[ "${ZIG_VERSION}" == *"-dev."* ]]; then
            url="https://ziglang.org/builds/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          else
            url="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          fi
          curl -fsSL "$url" -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
      # The static-musl ReleaseFast binary is the production artifact — verify it
      # links and produces a stripped executable on every change.
      - name: Build static musl release
        run: zig build release -Dtarget=x86_64-linux-musl
      - name: Verify artifact
        run: |
          file zig-out/bin/onyx-server
          test -x zig-out/bin/onyx-server
          # The daemon core embeds @tagName(builtin.mode) for its VERSION line —
          # exactly one mode string ends up in the binary. Assert the core is
          # really ReleaseFast: a mis-wired build graph once shipped a "release"
          # shim wrapping a Debug core, and this catches that structurally.
          grep -aq ReleaseFast zig-out/bin/onyx-server
          ! grep -aq Debug zig-out/bin/onyx-server
      - name: Upload daemon binary
        uses: actions/upload-artifact@v4
        with:
          name: onyx-server-x86_64-linux-musl
          path: zig-out/bin/onyx-server
          if-no-files-found: error
          retention-days: 14
